<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="canonical" href="https://future.thedigicraft.co.uk/" />

  <meta property="og:site_name" content="Digital Craft" />

  <meta property="og:title" content="Custom systems for the work that matters · Digital Craft" />
  <meta property="og:description" content="Bespoke websites, CRMs, and member portals for charities behind recovery, education and lived experience. Three real builds — Against the Odds, GamLEARN, Hike2Heal Recovery." />
  <meta property="og:image" content="https://future.thedigicraft.co.uk/assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Digital Craft — custom systems for the work that matters. Three real builds for Against the Odds, GamLEARN, and Hike2Heal Recovery." />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Custom systems for the work that matters · Digital Craft" />
  <meta name="twitter:description" content="Bespoke websites, CRMs, and member portals for charities behind recovery, education and lived experience." />
  <meta name="twitter:image" content="https://future.thedigicraft.co.uk/assets/og-image.png" />
  <meta name="twitter:image:alt" content="Digital Craft — custom systems for the work that matters." />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="alternate icon" href="assets/dc-mark-black.png" />

  <!-- Deck styles (DC tokens + deck styling). H2H base styles are loaded last
       so the H2H case-study embeds still render correctly — but the deck shell
       does not depend on them. -->
  <link rel="stylesheet" href="proposal-styles.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="tokens.css" />

  <style>
    input, textarea, select, button { font-family: inherit; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- H2H website components (needed for the H2H case study and live demo overlay) -->
  <script src="dist/icons.js"></script>
  <script src="dist/sub-header.js"></script>
  <script src="dist/hike-calendar.js"></script>
  <script src="dist/desktop-1-hero.js"></script>
  <script src="dist/desktop-2-about-mission.js"></script>
  <script src="dist/desktop-plan-hike.js"></script>
  <script src="dist/desktop-3-journey-adventures-impact.js"></script>
  <script src="dist/desktop-4-gallery-testimonial-footer.js"></script>
  <script src="dist/desktop.js"></script>
  <script src="dist/event-page.js"></script>
  <script src="dist/booking-page.js"></script>
  <script src="dist/membership-page.js"></script>
  <script src="dist/mobile.js"></script>

  <!-- Against the Odds CRM -->
  <script src="dist/ato-deck/ato-mocks.js"></script>

  <!-- GamLEARN CRM + Portal components. Load order matters:
       primitives → shell → screen modules. They expose components on window.* -->
  <script src="dist/gamlearn-deck/primitives.js"></script>
  <script src="dist/gamlearn-deck/crm-shell.js"></script>
  <script src="dist/gamlearn-deck/crm-triage.js"></script>
  <script src="dist/gamlearn-deck/crm-screens-a.js"></script>
  <script src="dist/gamlearn-deck/crm-screens-b.js"></script>
  <script src="dist/gamlearn-deck/crm-screens-c.js"></script>
  <script src="dist/gamlearn-deck/portal-screens.js"></script>

  <!-- The deck itself -->
  <script src="dist/proposal-slides.js"></script>

  <script>
    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(window.ProposalApp)
    );
  </script>
</body>
</html>
